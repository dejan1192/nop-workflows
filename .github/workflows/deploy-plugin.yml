name: Deploy nopCommerce Plugin

on:
  workflow_call:
    inputs:
      plugin_name:
        required: true
        type: string
    secrets:
      SSH_PRIVATE_KEY:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout nopCommerce 4.70
        uses: actions/checkout@v4
        with:
          repository: nopSolutions/nopCommerce
          ref: release-4.70.0
          path: nopcommerce

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: nopcommerce/src/Plugins/${{ inputs.plugin_name }}

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build plugin
        working-directory: nopcommerce/src
        run: |
          dotnet build \
            Plugins/${{ inputs.plugin_name }}/${{ inputs.plugin_name }}.csproj \
            -c Release --nologo

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ vars.SSH_PORT }} ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          PLUGIN_NAME="${{ inputs.plugin_name }}"
          PLUGIN_SRC="nopcommerce/src/Presentation/Nop.Web/Plugins/$PLUGIN_NAME"
          REMOTE_LIVE="${{ vars.REMOTE_NOP_ROOT }}/Plugins/$PLUGIN_NAME"
          RELEASE_ID=$(date +%Y%m%d_%H%M%S)
          STAGING="${{ vars.REMOTE_NOP_ROOT }}/_plugin_releases/$PLUGIN_NAME/$RELEASE_ID"
          BACKUP="${{ vars.REMOTE_NOP_ROOT }}/_plugin_backups/$PLUGIN_NAME/$RELEASE_ID"

          ssh -p ${{ vars.SSH_PORT }} ${{ vars.SSH_HOST }} "mkdir -p $(dirname $STAGING) $(dirname $BACKUP)"
          scp -P ${{ vars.SSH_PORT }} -r $PLUGIN_SRC ${{ vars.SSH_HOST }}:$STAGING

          ssh -p ${{ vars.SSH_PORT }} ${{ vars.SSH_HOST }} "
            set -euo pipefail
            [ -d '$REMOTE_LIVE' ] && mv '$REMOTE_LIVE' '$BACKUP'
            mv '$STAGING' '$REMOTE_LIVE'
            chown -R www-data:www-data '$REMOTE_LIVE'
            find '$REMOTE_LIVE' -type d -exec chmod 755 {} +
            find '$REMOTE_LIVE' -type f -exec chmod 644 {} +
            systemctl restart nopcommerce.service
          "